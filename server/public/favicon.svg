<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- TV body -->
  <rect x="6" y="18" width="52" height="36" rx="4" fill="#1a1a24" stroke="#6366f1" stroke-width="3"/>
  <!-- Screen -->
  <rect x="12" y="23" width="40" height="26" rx="2" fill="#252535"/>
  <!-- Screen glare accent -->
  <rect x="14" y="25" width="16" height="2" rx="1" fill="#6366f1" opacity="0.4"/>
  <!-- Antenna left -->
  <line x1="24" y1="18" x2="14" y2="4" stroke="#9999aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna right -->
  <line x1="40" y1="18" x2="50" y2="4" stroke="#9999aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna knobs -->
  <circle cx="14" cy="4" r="2.5" fill="#6366f1"/>
  <circle cx="50" cy="4" r="2.5" fill="#6366f1"/>
  <!-- Feet -->
  <rect x="16" y="54" width="8" height="4" rx="1" fill="#9999aa"/>
  <rect x="40" y="54" width="8" height="4" rx="1" fill="#9999aa"/>
  <!-- Play triangle on screen -->
  <polygon points="28,31 28,43 39,37" fill="#6366f1" opacity="0.8"/>
</svg>
