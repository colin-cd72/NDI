<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NDI Remote Viewer - Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">NDI Remote Viewer</div>
    <div class="nav-right">
      <span id="userInfo" class="nav-user"></span>
      <a id="adminBtn" href="/admin.html" class="btn btn-small" hidden>Admin</a>
      <button id="logoutBtn" class="btn btn-small btn-outline">Logout</button>
    </div>
  </nav>

  <div class="dashboard">
    <aside class="sidebar">
      <h2>NDI Sources</h2>
      <div id="agentStatus" class="agent-status disconnected">Agent: Disconnected</div>
      <ul id="sourceList" class="source-list">
        <li class="source-empty">No sources available</li>
      </ul>
    </aside>

    <main class="main-content">
      <div id="playerContainer" class="player-container">
        <div id="playerPlaceholder" class="player-placeholder">
          <p>Select an NDI source to start viewing</p>
        </div>
        <video id="videoPlayer" hidden playsinline muted></video>
        <div id="playerOverlay" class="player-overlay" hidden>
          <span id="streamInfo"></span>
          <button id="fullscreenBtn" class="btn-icon" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
